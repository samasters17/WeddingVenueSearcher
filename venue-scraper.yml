name: Wedding Venue Scraper

on:
  schedule:
    # Runs every day at 08:00 UTC. Edit the cron expression to change frequency.
    - cron: "0 8 * * *"
    env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  workflow_dispatch: {}  # lets you trigger it manually from the Actions tab

permissions:
  contents: write  # needed so the workflow can commit venues.json back to the repo

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
        run: python scraper.py

      - name: Commit updated venue list
        run: |
          git config user.name "venue-scraper-bot"
          git config user.email "actions@github.com"
          git add venues.json
          git diff --quiet --cached || git commit -m "Update venue list"
          git push
